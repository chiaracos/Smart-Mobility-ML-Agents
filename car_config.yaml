behaviors:
  CarAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 12000
      learning_rate: 0.0001
      beta: 0.01               
      epsilon: 0.1             
      lambd: 0.95             
      num_epoch: 3             
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99            
        strength: 1.0          
      curiosity:
        gamma: 0.99            
        strength: 0.02        
        encoding_size: 256     
        learning_rate: 3.0e-4    
    max_steps: 700000
    time_horizon: 64
    summary_freq: 1000
